name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy pandas scipy pytest
      - name: Test interaction generator
        run: |
          python - <<'PYEOF'
          from data.synthetic_interactions import generate_interactions
          df = generate_interactions(50, 20, (2, 5))
          assert len(df) > 0
          assert 'user_id' in df.columns
          print('interactions OK, shape:', df.shape)
          PYEOF
      - name: Test ranking metrics
        run: |
          python - <<'PYEOF'
          from evaluation.ranking_metrics import ndcg_at_k, precision_at_k, evaluate_recommendations
          recommended = [1, 0, 1, 0, 1]
          relevant = set([1, 3])
          score = ndcg_at_k(recommended, relevant, 5)
          assert 0 < score <= 1
          prec = precision_at_k(recommended, relevant, 5)
          assert 0 <= prec <= 1
          print('ndcg OK:', round(score, 3), 'precision OK:', round(prec, 3))
          PYEOF
