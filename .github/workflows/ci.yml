name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy pandas scipy pytest
      - run: python -c "from data.synthetic_interactions import generate_interactions; df=generate_interactions(50,20,(2,5)); assert len(df)>0; print('OK')"
      - run: python -c "from evaluation.ranking_metrics import ndcg_at_k; s=ndcg_at_k([1,0,1],{1},3); assert 0<s<=1; print(f'ndcg OK: {s:.3f}')"
